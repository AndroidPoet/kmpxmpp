name: Build

on:
  workflow_dispatch:

jobs:
  jvm-verify:
    name: JVM Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile JVM modules
        run: ./gradlew compileKotlinJvm --no-daemon --stacktrace

      - name: Run JVM tests
        run: ./gradlew jvmTest --no-daemon --stacktrace

      - name: Verify Local Publishability
        run: ./gradlew publishToMavenLocal --no-daemon --stacktrace
