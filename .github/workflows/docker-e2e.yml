name: Docker E2E

on:
  workflow_dispatch:

jobs:
  prosody-jvm-e2e:
    name: Prosody JVM E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker availability
        run: |
          docker --version
          docker compose version

      - name: Run production verification gates
        run: ./gradlew productionVerify --no-daemon --stacktrace

      - name: Run WhatsApp-style JVM sample against Docker backend
        run: bash kmpxmpp-sample-whatsapp-jvm/scripts/run-whatsapp-docker-sample.sh
